<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Journal - Configuration Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-xl space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-black text-emerald-400 tracking-tight">Create Profile</h1>
            <p class="text-slate-400">Configure your local tracking engine environment</p>
        </div>
        <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Username</label>
                <input type="text" name="username" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-white">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Email</label>
                <input type="email" name="email" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-white">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 text-white">
            </div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-emerald-500/20">Complete Configuration</button>
        </form>
        <p class="text-center text-xs text-slate-400">Already initialized? <a href="{{ url_for('auth.login') }}" class="text-emerald-400 hover:underline">Sign In</a></p>
    </div>
</body>
</html>
